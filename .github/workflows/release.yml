name: Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整历史和 tag 才能生成两版之间的更新日志

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "touch-grass-${{ github.ref_name }}.apk"

      # release 正文 = 上一个 tag 到当前 tag 之间的 commit message
      #（直推仓库没有 PR，GitHub 自带的 generate_release_notes 会是空的）
      - name: Generate release notes from commits
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          prev=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then range="$prev..${{ github.ref_name }}"; else range="${{ github.ref_name }}"; fi
          git log "$range" --no-merges --format='### %s%n%n%b' > RELEASE_BODY.md
          if [ -n "$prev" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...${{ github.ref_name }}" >> RELEASE_BODY.md
          fi

      # 推 tag 时：创建/更新 release 并附上 APK
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: touch-grass-*.apk
          body_path: RELEASE_BODY.md

      # 手动触发时：只把 APK 存成 artifact，方便验证流水线
      - name: Upload artifact (manual run)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: touch-grass-apk
          path: touch-grass-*.apk
